name: Update World Cup data

on:
  schedule:
    # Every 2 hours during the SGT (UTC+8) match window: 00:00–14:00 SGT.
    # GitHub Pages serves whatever is committed to main, so this commit is
    # what makes the live site update. Cron runs in UTC, so 00,02,...,14 SGT
    # map to UTC hours 16,18,20,22 (prev day) and 00,02,04,06.
    - cron: "0 0,2,4,6,16,18,20,22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest data
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/fetch-data.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: refresh World Cup data"
          git push
