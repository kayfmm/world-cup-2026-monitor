<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Monitor</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>FIFA World Cup 2026 Monitor</h1>
  <p id="last-updated" class="muted"></p>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="scores">Scores</button>
  <button class="tab-btn" data-tab="highlights">Highlights</button>
  <button class="tab-btn" data-tab="stats">Player Stats</button>
  <button class="tab-btn" data-tab="tables">Tables</button>
</nav>

<main>
  <section id="scores" class="tab-panel active">
    <div id="scores-list" class="list">Loading…</div>
  </section>

  <section id="highlights" class="tab-panel">
    <div id="highlights-list" class="list">Loading…</div>
  </section>

  <section id="stats" class="tab-panel">
    <table id="stats-table">
      <thead>
        <tr><th>Player</th><th>Team</th><th>Goals</th><th>Assists</th><th>Penalties</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </section>

  <section id="tables" class="tab-panel">
    <div id="standings-groups"></div>
  </section>
</main>

<footer>
  <p class="muted">Data via football-data.org &amp; YouTube Data API. Refreshed automatically by GitHub Actions.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
